<!-- UC11 Registrácia nového čitateľa -->
<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal">

    <div class="modal__header">
      <h4 class="modal__title">Registrácia nového čitateľa</h4>
      <button class="modal__close" (click)="close()">×</button>
    </div>

    <div class="modal__body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
          <div class="form-group">
            <label>Meno</label>
            <input class="form-control"
                   [class.is-invalid]="submitted && form.get('firstName')?.invalid"
                   formControlName="firstName" placeholder="Ján" />
            <div class="form-error" *ngIf="submitted && form.get('firstName')?.hasError('required')">
              Meno je povinné.
            </div>
          </div>
          <div class="form-group">
            <label>Priezvisko</label>
            <input class="form-control"
                   [class.is-invalid]="submitted && form.get('lastName')?.invalid"
                   formControlName="lastName" placeholder="Novák" />
            <div class="form-error" *ngIf="submitted && form.get('lastName')?.hasError('required')">
              Priezvisko je povinné.
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>E-mail</label>
          <input class="form-control" type="email"
                 [class.is-invalid]="submitted && form.get('email')?.invalid"
                 formControlName="email" placeholder="jan.novak@example.sk" />
          <div class="form-error" *ngIf="submitted && form.get('email')?.hasError('required')">E-mail je povinný.</div>
          <div class="form-error" *ngIf="submitted && form.get('email')?.hasError('email')">Neplatný formát e-mailu.</div>
          <div class="form-error" *ngIf="emailTaken">Tento e-mail je už registrovaný.</div>
        </div>

        <div class="form-group">
          <label>Typ členstva</label>
          <select class="form-select" formControlName="membershipType">
            <option value="ADULT">Dospelý</option>
            <option value="STUDENT">Študent</option>
            <option value="SENIOR">Senior</option>
          </select>
          <div class="form-hint">Členstvo platí 12 mesiacov od dátumu registrácie.</div>
        </div>

      </form>
    </div>

    <div class="modal__footer">
      <button class="btn btn-default" (click)="close()">Zrušiť</button>
      <button class="btn btn-primary" [disabled]="isSubmitting" (click)="onSubmit()">
        <div class="spinner spinner-sm" *ngIf="isSubmitting"></div>
        <span *ngIf="!isSubmitting">Registrovať</span>
      </button>
    </div>

  </div>
</div>
