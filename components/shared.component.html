<!-- ═══════════════════════════════════════════════════════════
     book-card.component.html  ─  reusable kniha card
     Usage: <app-book-card [book]="book" (reserve)="onReserve($event)"></app-book-card>
     ═══════════════════════════════════════════════════════════ -->

<div class="book-card" (click)="onClick()">
  <div class="book-card__spine" [style.background]="spineColor">
    <span style="font-size: 11px; font-weight: 500; opacity: .75; line-height: 1.3; color: inherit;">
      {{ book.title | slice:0:18 }}
    </span>
  </div>

  <div class="book-card__title truncate" [title]="book.title">{{ book.title }}</div>
  <div class="book-card__author truncate">{{ book.author }}</div>

  <!-- Rating if available -->
  <div [@If]="book.avgRating" class="d-flex align-center gap-2" style="margin-bottom: 6px;">
    <svg width="11" height="11" viewBox="0 0 14 14">
      <polygon points="7,1 8.8,5.2 13,5.6 9.9,8.6 10.8,12.8 7,10.6 3.2,12.8 4.1,8.6 1,5.6 5.2,5.2" fill="#EF9F27"/>
    </svg>
    <span style="font-size: 12px; color: #6B6966;">{{ book.avgRating | number:'1.1-1' }}</span>
    <span style="font-size: 12px; color: #9B9894;">({{ book.ratingCount }})</span>
  </div>

  <div class="book-card__footer">
    <span class="badge"
          [class.badge-active]="book.availableCopies > 0"
          [class.badge-overdue]="book.availableCopies === 0">
      {{ book.availableCopies > 0 ? book.availableCopies + ' voľných' : 'Nedostupná' }}
    </span>

    <button
      *ngIf="book.availableCopies === 0 && showReserve"
      class="btn btn-ghost btn-sm"
      (click)="$event.stopPropagation(); reserve.emit(book)"
      title="Rezervovať"
    >
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>
</div>
